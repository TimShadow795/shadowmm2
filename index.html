<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚫ shadowmm2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            color: #ffffff;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffffff;
            border-radius: 4px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: #000000;
            border-bottom: 2px solid #ffffff;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
        }

        .logo span {
            font-size: 14px;
            font-weight: normal;
            color: #666;
        }

        .header-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .cart-btn {
            padding: 10px 20px;
            border: 2px solid #ffffff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: transparent;
            color: #ffffff;
            position: relative;
        }

        .cart-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        .cart-btn span {
            background: #ffffff;
            color: #000000;
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 5px;
        }

        .contact-btn {
            padding: 10px 20px;
            border: 2px solid #ffffff;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            background: #ffffff;
            color: #000000;
        }

        .contact-btn:hover {
            background: transparent;
            color: #ffffff;
        }

        /* Уведомления */
        #notification {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
        }

        .notification-item {
            background: #1a1a1a;
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 10px;
            animation: slideIn 0.5s ease;
            min-width: 250px;
            color: #ffffff;
        }

        .notification-item.success {
            border-left: 4px solid #ffffff;
        }

        .notification-item.error {
            border-left: 4px solid #ff4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Фильтры */
        .filters {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .filters input,
        .filters select {
            padding: 12px 20px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 16px;
            flex: 1;
            min-width: 200px;
            transition: border-color 0.3s;
            background: #111;
            color: #ffffff;
        }

        .filters input::placeholder {
            color: #555;
        }

        .filters input:focus,
        .filters select:focus {
            outline: none;
            border-color: #ffffff;
        }

        .filters select option {
            background: #111;
            color: #ffffff;
        }

        .filters select {
            flex: 0.3;
            min-width: 150px;
            cursor: pointer;
        }

        /* Сетка товаров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .product-card {
            background: #111;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ffffff;
            box-shadow: 0 0 40px rgba(255,255,255,0.05);
        }

        .product-content {
            padding: 20px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #ffffff;
            margin: 10px 0;
        }

        .product-desc {
            color: #888;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
            min-height: 60px;
        }

        .product-stock {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
        }

        .product-stock .in-stock {
            color: #ffffff;
            font-weight: 600;
        }

        .product-stock .out-of-stock {
            color: #ff4444;
            font-weight: 600;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .product-actions button {
            flex: 1;
            padding: 10px;
            border: 2px solid #ffffff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            background: transparent;
            color: #ffffff;
        }

        .buy-btn:hover {
            background: #ffffff;
            color: #000000;
        }

        .buy-btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }

        .buy-btn:disabled:hover {
            background: transparent;
            color: #333;
        }

        .delete-btn {
            border-color: #444 !important;
            color: #666 !important;
            flex: 0.3;
        }

        .delete-btn:hover {
            border-color: #ff4444 !important;
            color: #ff4444 !important;
            background: transparent !important;
        }

        /* Модальное окно корзины */
        .modal {
            display: none;
            position: fixed;
            z-index: 200;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #111;
            margin: 5% auto;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            border: 1px solid #333;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h2 {
            color: #ffffff;
            margin-bottom: 20px;
        }

        .close {
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #555;
            transition: color 0.3s;
        }

        .close:hover {
            color: #ffffff;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #222;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 16px;
            color: #ffffff;
        }

        .cart-item-price {
            color: #ffffff;
            font-weight: bold;
        }

        .cart-item-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .cart-item-controls button {
            padding: 5px 12px;
            border: 1px solid #333;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            background: transparent;
            color: #ffffff;
        }

        .cart-item-controls .qty-btn:hover {
            border-color: #ffffff;
            color: #ffffff;
        }

        .cart-item-controls .remove-btn {
            border-color: #444;
            color: #666;
        }

        .cart-item-controls .remove-btn:hover {
            border-color: #ff4444;
            color: #ff4444;
        }

        .cart-total {
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            padding: 20px 0;
            border-top: 2px solid #222;
            margin-top: 20px;
            color: #ffffff;
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            background: #000000;
            color: #ffffff;
            border: 2px solid #ffffff;
        }

        .empty-cart {
            text-align: center;
            color: #555;
            padding: 30px;
            font-size: 18px;
        }

        /* Footer */
        footer {
            margin-top: 50px;
            padding: 40px 0;
            background: #000000;
            border-top: 2px solid #ffffff;
            text-align: center;
        }

        footer .contact-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        footer .contact-info a {
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 25px;
            border: 2px solid #ffffff;
            border-radius: 25px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        footer .contact-info a:hover {
            background: #ffffff;
            color: #000000;
        }

        footer .footer-text {
            color: #444;
            font-size: 14px;
            margin-top: 15px;
        }

        footer .footer-text span {
            color: #ffffff;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #555;
            font-size: 18px;
        }

        /* Адаптив */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .header-controls {
                flex-direction: column;
            }
            
            .header-controls button,
            .contact-btn {
                width: 100%;
                text-align: center;
            }
            
            .products-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .filters {
                flex-direction: column;
            }
            
            .filters select {
                flex: 1;
            }
            
            .modal-content {
                margin: 10% auto;
                padding: 20px;
                width: 95%;
            }

            footer .contact-info {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                shadowmm2
                <span>| интернет-магазин</span>
            </div>
            <div class="header-controls">
                <button onclick="showCart()" class="cart-btn">
                    🛒 Корзина <span id="cartCount">0</span>
                </button>
                <a href="https://t.me/timshadow11" target="_blank" class="contact-btn">
                    💬 Написать продавцу
                </a>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Уведомления -->
        <div id="notification"></div>

        <!-- Фильтры -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="🔍 Поиск товаров..." onkeyup="filterProducts()">
            <select id="sortSelect" onchange="sortProducts()">
                <option value="default">Сортировка</option>
                <option value="price-asc">Цена ↑</option>
                <option value="price-desc">Цена ↓</option>
                <option value="name">По названию</option>
            </select>
        </div>

        <!-- Список товаров -->
        <div id="productsGrid" class="products-grid">
            <div class="loading">⏳ Загрузка товаров...</div>
        </div>

        <!-- Корзина (модальное окно) -->
        <div id="cartModal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeCart()">&times;</span>
                <h2>🛒 Ваша корзина</h2>
                <div id="cartItems"></div>
                <div id="cartTotal" class="cart-total"></div>
                <button onclick="checkout()" class="checkout-btn">✅ Оформить заказ</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="contact-info">
                <a href="https://t.me/timshadow11" target="_blank">
                    💬 Написать продавцу в Telegram
                </a>
                <span style="color: #333;">|</span>
                <span style="color: #444;">📧 По всем вопросам обращайтесь</span>
            </div>
            <div class="footer-text">
                © 2026 <span>shadowmm2</span>. Все права защищены.
            </div>
        </div>
    </footer>

    <script>
        // Хранилище товаров
        let products = [];
        let cart = [];
        let nextId = 1;
        let isLoaded = false;

        // Загрузка товаров из tovar.txt
        async function loadFromTovarFile() {
            try {
                const response = await fetch('tovar.txt');
                if (!response.ok) {
                    throw new Error('Файл tovar.txt не найден');
                }
                const content = await response.text();
                parseTovarFile(content);
                isLoaded = true;
            } catch (error) {
                console.log('Ошибка загрузки tovar.txt:', error);
                loadDemoProducts();
            }
        }

        // Загрузка демо-товаров
        function loadDemoProducts() {
            const demoProducts = [
                { id: nextId++, name: 'iPhone 15 Pro', price: 99990, description: 'Новейший смартфон с титановым корпусом и мощным процессором', stock: 15 },
                { id: nextId++, name: 'Наушники Sony WH-1000XM5', price: 34990, description: 'Лучшие беспроводные наушники с шумоподавлением', stock: 8 },
                { id: nextId++, name: 'Клавиатура Mechanical', price: 12990, description: 'Механическая клавиатура с RGB подсветкой', stock: 25 },
                { id: nextId++, name: 'Монитор 4K 27"', price: 45990, description: '4K монитор с IPS матрицей и частотой 144Hz', stock: 5 },
                { id: nextId++, name: 'Мышь Logitech MX Master 3S', price: 14990, description: 'Эргономичная мышь с бесшумными кнопками', stock: 12 }
            ];
            products = demoProducts;
            saveProducts();
            renderProducts();
            showNotification('📦 Загружены демо-товары. Добавьте файл tovar.txt', 'success');
        }

        // Парсинг файла tovar.txt
        function parseTovarFile(content) {
            const lines = content.split('\n');
            let currentProduct = null;
            let addedCount = 0;
            let errorCount = 0;
            
            products = [];
            nextId = 1;
            
            for (let line of lines) {
                line = line.trim();
                if (!line) continue;
                
                if (line.startsWith('tovar')) {
                    if (currentProduct) {
                        if (validateAndAddProduct(currentProduct)) {
                            addedCount++;
                        } else {
                            errorCount++;
                        }
                    }
                    currentProduct = {};
                } else if (currentProduct) {
                    const parts = line.split(':');
                    if (parts.length >= 2) {
                        const key = parts[0].trim().toLowerCase();
                        const value = parts.slice(1).join(':').trim();
                        
                        if (key === 'name') currentProduct.name = value;
                        else if (key === 'price') currentProduct.price = parseFloat(value);
                        else if (key === 'description') currentProduct.description = value;
                        else if (key === 'stock') currentProduct.stock = parseInt(value);
                    }
                }
            }
            
            if (currentProduct) {
                if (validateAndAddProduct(currentProduct)) {
                    addedCount++;
                } else {
                    errorCount++;
                }
            }
            
            if (addedCount > 0) {
                saveProducts();
                renderProducts();
                showNotification(`✅ Загружено товаров: ${addedCount}${errorCount > 0 ? `, ошибок: ${errorCount}` : ''}`, 'success');
            } else {
                loadDemoProducts();
            }
        }

        // Валидация и добавление товара
        function validateAndAddProduct(product) {
            if (!product.name || isNaN(product.price) || isNaN(product.stock)) {
                return false;
            }
            
            product.id = nextId++;
            product.description = product.description || 'Нет описания';
            products.push(product);
            return true;
        }

        // Загрузка товаров из localStorage
        function loadProducts() {
            const saved = localStorage.getItem('shopProducts');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed && parsed.length > 0) {
                    products = parsed;
                    nextId = Math.max(...products.map(p => p.id)) + 1;
                    renderProducts();
                    updateCartCount();
                    return true;
                }
            }
            return false;
        }

        // Сохранение товаров в localStorage
        function saveProducts() {
            localStorage.setItem('shopProducts', JSON.stringify(products));
        }

        // Показать уведомление
        function showNotification(message, type = 'success') {
            const container = document.getElementById('notification');
            const notification = document.createElement('div');
            notification.className = `notification-item ${type}`;
            notification.textContent = message;
            container.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }

        // Отображение товаров
        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            
            let filtered = products.filter(p => 
                p.name.toLowerCase().includes(search) || 
                p.description.toLowerCase().includes(search)
            );
            
            if (sort === 'price-asc') {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sort === 'price-desc') {
                filtered.sort((a, b) => b.price - a.price);
            } else if (sort === 'name') {
                filtered.sort((a, b) => a.name.localeCompare(b.name));
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="text-align: center; padding: 50px; color: #333; font-size: 18px;">📭 Товаров не найдено</p>';
                return;
            }
            
            grid.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-content">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${product.price.toLocaleString()} ₽</div>
                        <div class="product-desc">${product.description}</div>
                        <div class="product-stock">
                            ${product.stock > 0 
                                ? `<span class="in-stock">✅ В наличии: ${product.stock} шт.</span>` 
                                : `<span class="out-of-stock">❌ Нет в наличии</span>`}
                        </div>
                        <div class="product-actions">
                            <button class="buy-btn" onclick="addToCart(${product.id})" ${product.stock === 0 ? 'disabled' : ''}>
                                🛒 В корзину
                            </button>
                            <button class="delete-btn" onclick="deleteProduct(${product.id})">🗑</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Фильтр товаров
        function filterProducts() {
            renderProducts();
        }

        // Сортировка товаров
        function sortProducts() {
            renderProducts();
        }

        // Добавление в корзину
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;
            
            if (product.stock <= 0) {
                showNotification('❌ Товар отсутствует на складе!', 'error');
                return;
            }
            
            const cartItem = cart.find(item => item.id === productId);
            if (cartItem) {
                if (cartItem.quantity >= product.stock) {
                    showNotification('❌ Недостаточно товара на складе!', 'error');
                    return;
                }
                cartItem.quantity++;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    quantity: 1
                });
            }
            
            product.stock--;
            saveProducts();
            updateCartCount();
            showNotification(`✅ "${product.name}" добавлен в корзину`);
        }

        // Обновление счетчика корзины
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        // Показать корзину
        function showCart() {
            const modal = document.getElementById('cartModal');
            const items = document.getElementById('cartItems');
            const total = document.getElementById('cartTotal');
            
            if (cart.length === 0) {
                items.innerHTML = '<div class="empty-cart">🛒 Корзина пуста</div>';
                total.innerHTML = '';
                modal.style.display = 'block';
                return;
            }
            
            items.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${(item.price * item.quantity).toLocaleString()} ₽</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="qty-btn" onclick="changeQuantity(${index}, -1)">−</button>
                        <span style="font-weight: bold; min-width: 30px; text-align: center; color: #fff;">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
                        <button class="remove-btn" onclick="removeFromCart(${index})">✕</button>
                    </div>
                </div>
            `).join('');
            
            const totalSum = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            total.innerHTML = `Итого: ${totalSum.toLocaleString()} ₽`;
            
            modal.style.display = 'block';
        }

        // Изменить количество в корзине
        function changeQuantity(index, delta) {
            const item = cart[index];
            if (!item) return;
            
            const product = products.find(p => p.id === item.id);
            if (!product) return;
            
            if (delta > 0) {
                if (product.stock <= 0) {
                    showNotification('❌ Недостаточно товара!', 'error');
                    return;
                }
                item.quantity++;
                product.stock--;
            } else {
                if (item.quantity > 1) {
                    item.quantity--;
                    product.stock++;
                } else {
                    product.stock += item.quantity;
                    cart.splice(index, 1);
                }
            }
            
            saveProducts();
            updateCartCount();
            showCart();
            renderProducts();
        }

        // Удалить из корзины
        function removeFromCart(index) {
            const item = cart[index];
            if (!item) return;
            
            const product = products.find(p => p.id === item.id);
            if (product) {
                product.stock += item.quantity;
                saveProducts();
            }
            
            cart.splice(index, 1);
            updateCartCount();
            showCart();
            renderProducts();
        }

        // Закрыть корзину
        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        // Оформить заказ
        function checkout() {
            if (cart.length === 0) {
                showNotification('❌ Корзина пуста!', 'error');
                return;
            }
            
            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            const orderNumber = Date.now();
            
            let receipt = `🧾 ЧЕК №${orderNumber}\n`;
            receipt += `Магазин: shadowmm2\n`;
            receipt += `Дата: ${new Date().toLocaleString()}\n`;
            receipt += `${'='.repeat(40)}\n`;
            cart.forEach(item => {
                receipt += `${item.name} x${item.quantity} = ${(item.price * item.quantity).toLocaleString()} ₽\n`;
            });
            receipt += `${'='.repeat(40)}\n`;
            receipt += `ИТОГО: ${total.toLocaleString()} ₽\n`;
            receipt += `\nСпасибо за покупку! 🎉\n`;
            receipt += `По вопросам: @timshadow11`;
            
            const blob = new Blob([receipt], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `чек_${orderNumber}.txt`;
            link.click();
            
            showNotification(`✅ Заказ оформлен! Сумма: ${total.toLocaleString()} ₽`);
            
            cart = [];
            updateCartCount();
            closeCart();
            renderProducts();
            saveProducts();
        }

        // Удалить товар
        function deleteProduct(productId) {
            if (!confirm('Удалить товар?')) return;
            
            const index = products.findIndex(p => p.id === productId);
            if (index === -1) return;
            
            const product = products[index];
            products.splice(index, 1);
            saveProducts();
            renderProducts();
            showNotification(`🗑 Товар "${product.name}" удален`);
        }

        // Закрытие модалки по клику вне
        window.onclick = function(event) {
            const modal = document.getElementById('cartModal');
            if (event.target === modal) {
                closeCart();
            }
        };

        // Инициализация
        async function init() {
            const hasSaved = loadProducts();
            
            if (!hasSaved) {
                await loadFromTovarFile();
            } else {
                try {
                    const response = await fetch('tovar.txt?t=' + Date.now());
                    if (response.ok) {
                        const content = await response.text();
                        const lines = content.split('\n');
                        let currentProduct = null;
                        let hasNewProducts = false;
                        
                        for (let line of lines) {
                            line = line.trim();
                            if (!line) continue;
                            if (line.startsWith('tovar')) {
                                if (currentProduct) {
                                    if (currentProduct.name && !isNaN(currentProduct.price) && !isNaN(currentProduct.stock)) {
                                        hasNewProducts = true;
                                        break;
                                    }
                                }
                                currentProduct = {};
                            } else if (currentProduct) {
                                const parts = line.split(':');
                                if (parts.length >= 2) {
                                    const key = parts[0].trim().toLowerCase();
                                    const value = parts.slice(1).join(':').trim();
                                    if (key === 'name') currentProduct.name = value;
                                    else if (key === 'price') currentProduct.price = parseFloat(value);
                                    else if (key === 'stock') currentProduct.stock = parseInt(value);
                                }
                            }
                        }
                        
                        if (hasNewProducts) {
                            parseTovarFile(content);
                            showNotification('🔄 Товары обновлены из tovar.txt', 'success');
                        }
                    }
                } catch (e) {}
            }
        }

        init();
    </script>
</body>
</html>
